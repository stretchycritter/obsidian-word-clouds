name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump level"
        required: true
        default: minor
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Run unit tests
        run: npm test

      - name: Bump version files
        id: bump
        run: |
          VERSION="$(node scripts/version-bump.mjs "${{ inputs.bump }}")"
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        run: |
          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "release workflow must run on main, got ${GITHUB_REF}"
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add manifest.json package.json package-lock.json versions.json
          git commit -m "chore(release): ${{ steps.bump.outputs.tag }}"
          git push origin "HEAD:main"

      - name: Create and push tag
        run: |
          git tag "${{ steps.bump.outputs.tag }}"
          git push origin "refs/tags/${{ steps.bump.outputs.tag }}"

      - name: Build release assets
        run: npm run build:release

      - name: Validate release metadata and artifacts
        run: npm run release:validate -- "${{ steps.bump.outputs.tag }}"

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          generate_release_notes: true
          target_commitish: ${{ steps.bump.outputs.tag }}
          files: |
            dist/manifest.json
            dist/main.js
            dist/styles.css
